<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Skill</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% include 'navbar.html' %}

<div class="container mt-5">

    <div class="card p-4">

        <h2>Edit Skill</h2>

        <form method="POST">

            <input
                type="text"
                name="skill_name"
                class="form-control mb-3"
                value="{{ skill[1] }}"
                required
            >

            <textarea
                name="description"
                class="form-control mb-3"
                rows="4"
                required
            >{{ skill[2] }}</textarea>

            <button class="btn btn-success">
                Update Skill
            </button>

        </form>

    </div>

</div>

</body>
</html>
