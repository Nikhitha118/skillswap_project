<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Skills</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
    background: linear-gradient(
        135deg,
        #eef2ff 0%,
        #ddd6fe 40%,
        #c4b5fd 100%
    );
    font-family: Arial, sans-serif;
    min-height: 100vh;
}

        .dashboard-banner{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            color:white;
            padding:60px 20px;
            text-align:center;
            margin-bottom:40px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }

        .dashboard-banner h1{
            font-size:3rem;
            font-weight:700;
        }

        .dashboard-banner p{
            font-size:1.1rem;
            margin-top:10px;
        }

        .card{
    border:none;
    border-radius:20px;
    padding:10px;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(10px);
    box-shadow:0 10px 25px rgba(79,70,229,0.15);
    transition:0.3s;
}
.container{
    max-width:1200px;
}

        .card:hover{
            transform:translateY(-5px);
        }

        .btn-primary{
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            border:none;
            border-radius:10px;
            padding:12px;
            font-weight:600;
        }

        .btn-primary:hover{
            opacity:0.9;
        }

        .section-title{
            font-weight:700;
            margin-bottom:25px;
        }
    </style>

</head>
<body>

    <!-- 🔥 DASHBOARD BUTTON (ADD HERE) -->

{% include 'navbar.html' %}

<div class="container mt-5">

        <h2 class="section-title">Available Skills</h2>

        {% for skill in skills %}

        <div class="card mt-4 p-4">

            <h3>{{ skill[1] }}</h3>

            <p class="text-muted">{{ skill[2] }}</p>

            <hr>

            <p><strong>👤</strong> {{ skill[3] }}</p>

            <p><strong>📧</strong> {{ skill[4] }}</p>

            <a href="mailto:{{ skill[4] }}" class="btn btn-primary w-100">
                Send Email
            </a>
            {% if skill[3] == session['username'] %}

<button class="btn btn-dark w-100 mt-2" disabled>
    Your Skill
</button>

{% elif skill[0] in requested_skills %}

<button class="btn btn-secondary w-100 mt-2" disabled>
    Requested ✓
</button>

{% else %}

<a href="/request-skill/{{ skill[0] }}" class="btn btn-success w-100 mt-2">
    Request to Learn
</a>

{% endif %}

        </div>

        {% endfor %}

    </div>

</body>
</html>
