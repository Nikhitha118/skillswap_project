<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#eef2ff;
        }

        .chat-box{
            background:white;
            border-radius:15px;
            padding:20px;
            height:500px;
            overflow-y:auto;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .message{
            padding:10px;
            margin-bottom:10px;
            border-radius:10px;
        }

        .sent{
            background:#c7d2fe;
            text-align:right;
        }

        .received{
            background:#e5e7eb;
        }
    </style>

</head>
<body>

{% include 'navbar.html' %}

<div class="container mt-5">

    <h2>💬 Chat with {{ username }}</h2>

    <div class="chat-box mt-4">

        {% for msg in messages %}

            {% if msg[1] == session['username'] %}

                <div class="message sent">
                    {{ msg[3] }}
                </div>

            {% else %}

                <div class="message received">
                    {{ msg[3] }}
                </div>

            {% endif %}

        {% endfor %}

    </div>

    <form method="POST" class="mt-3">

        <div class="input-group">

            <input
                type="text"
                name="message"
                class="form-control"
                placeholder="Type a message..."
                required
            >

            <button class="btn btn-primary">
                Send
            </button>

        </div>

    </form>

</div>

</body>
</html>
