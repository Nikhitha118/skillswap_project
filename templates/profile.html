<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
    background: linear-gradient(
        135deg,
        #eef2ff 0%,
        #ddd6fe 50%,
        #f3e8ff 100%
    );
    min-height:100vh;
}

        .page-title{
            font-size:2.8rem;
            font-weight:700;
            color:#1e293b;
            margin-bottom:25px;
        }

        .profile-card{
            background:white;
            border:none;
            border-radius:25px;
            padding:35px;
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
            margin-bottom:40px;
        }

        .skills-title{
            font-size:2rem;
            font-weight:700;
            color:#1e293b;
            margin-bottom:20px;
        }

        .skill-card{
            background:white;
            border:none;
            border-radius:20px;
            padding:25px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
            transition:0.3s;
            margin-bottom:20px;
        }

        .skill-card:hover{
            transform:translateY(-5px);
        }

        .skill-name{
            color:#4f46e5;
            font-weight:700;
        }

        .btn-edit{
            background:#fbbf24;
            border:none;
            color:black;
            font-weight:600;
            padding:10px 18px;
            border-radius:10px;
        }

        .btn-delete{
            background:#ef4444;
            border:none;
            color:white;
            font-weight:600;
            padding:10px 18px;
            border-radius:10px;
        }

        .user-info{
            font-size:1.3rem;
            font-weight:600;
            margin-bottom:12px;
            color:#334155;
        }
    </style>

</head>
<body>

{% include 'navbar.html' %}

<div class="container mt-5">

    <h1 class="page-title">👤 My Profile</h1>

    <div class="profile-card">

        <div class="user-info">
            👤 {{ username }}
        </div>

        <div class="user-info">
            📧 {{ email }}
        </div>

    </div>

    <h2 class="skills-title">🚀 My Skills</h2>

    {% for skill in my_skills %}

    <div class="skill-card">

        <h3 class="skill-name">{{ skill[1] }}</h3>

        <p class="text-muted">{{ skill[2] }}</p>

        <div class="d-flex gap-2 mt-3">

            <a href="/edit-skill/{{ skill[0] }}"
               class="btn btn-edit">
                ✏ Edit
            </a>

            <a href="/delete-skill/{{ skill[0] }}"
               class="btn btn-delete">
                🗑 Delete
            </a>

        </div>

    </div>

    {% endfor %}

</div>

</body>
</html>
